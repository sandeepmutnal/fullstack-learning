<!DOCTYPE html>
<html>

<head>

<title>Day 29 Dark Mode Toggle</title>

<style>

body {

font-family: Arial;
text-align: center;
margin-top: 50px;
transition: 0.4s;

}

.dark {

background-color: black;
color: white;

}

button {

padding: 12px;
font-size: 16px;

}

</style>

</head>

<body id="page">

<h1>Dark Mode Toggle Project</h1>

<p>This is Day 29 project</p>

<button onclick="toggleMode()">Toggle Dark Mode</button>

<script>

function toggleMode(){

document.getElementById("page").classList.toggle("dark");

}

</script>

</body>

</html>
