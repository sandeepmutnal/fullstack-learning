<!DOCTYPE html>
<html>

<head>
<title>Landing Page</title>

<style>

body {
font-family: Arial;
margin: 0;
}

/* Header */

header {
background: black;
color: white;
padding: 15px;
display: flex;
justify-content: space-between;
align-items: center;
}

nav a {
color: white;
margin: 10px;
text-decoration: none;
}

/* Hero Section */

.hero {
background: lightblue;
padding: 80px;
text-align: center;
}

.hero button {
padding: 15px;
background: black;
color: white;
border: none;
}

/* Features Section */

.features {
display: flex;
justify-content: space-around;
padding: 40px;
}

.feature-box {
background: #f4f4f4;
padding: 30px;
width: 200px;
text-align: center;
}

/* Footer */

footer {
background: black;
color: white;
text-align: center;
padding: 20px;
}

/* Responsive */

@media(max-width: 600px) {

.features {
flex-direction: column;
align-items: center;
}

}

</style>

</head>

<body>

<header>

<h2>My Startup</h2>

<nav>
<a href="#">Home</a>
<a href="#">Services</a>
<a href="#">Contact</a>
</nav>

</header>

<section class="hero">

<h1>Build Your Dream Website Today</h1>

<p>I create modern responsive websites for businesses.</p>

<button>Contact Me</button>

</section>

<section class="features">

<div class="feature-box">
<h3>Fast</h3>
<p>Quick website delivery.</p>
</div>

<div class="feature-box">
<h3>Responsive</h3>
<p>Mobile friendly design.</p>
</div>

<div class="feature-box">
<h3>Affordable</h3>
<p>Budget friendly services.</p>
</div>

</section>

<footer>

<p>© 2026 Vinsan | Landing Page Project</p>

</footer>

</body>

</html>
