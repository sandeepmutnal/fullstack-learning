<!DOCTYPE html>
<html>

<head>
    <title>Day 9 Fonts Styling</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        h1 {
            text-align: center;
            color: darkblue;
            font-size: 40px;
        }

        h2 {
            color: green;
            font-size: 28px;
        }

        p {
            font-size: 18px;
            color: #333;
            line-height: 1.6;
        }

        .highlight {
            font-weight: bold;
            color: red;
        }

        .center {
            text-align: center;
        }

        .underline {
            text-decoration: underline;
        }

        button {
            font-size: 16px;
            padding: 10px;
        }

    </style>

</head>

<body>

<h1>My Styled Website</h1>

<h2>About Me</h2>
<p>I am learning <span class="highlight">Web Development</span> step by step.</p>

<h2 class="center">My Goal</h2>
<p class="underline">Become a freelance developer and earn money.</p>

<button>Click Me</button>

</body>

</html>
