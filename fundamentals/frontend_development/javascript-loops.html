<!DOCTYPE html>
<html>

<head>

<title>Day 20 JavaScript Loops</title>

<style>

body {

font-family: Arial;
text-align: center;
padding: 50px;

}

button {

padding: 15px;
font-size: 18px;
background-color: black;
color: white;
border: none;

}

</style>

</head>

<body>

<h1>JavaScript Loop Example</h1>

<p id="output">Click button to generate list</p>

<button onclick="showNumbers()">Show Numbers</button>

<script>

function showNumbers() {

let text = "";

for(let i = 1; i <= 5; i++) {

text = text + "Number: " + i + "<br>";

}

document.getElementById("output").innerHTML = text;

}

</script>

</body>

</html>
