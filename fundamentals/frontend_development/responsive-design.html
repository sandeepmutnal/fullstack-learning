<!DOCTYPE html>
<html>

<head>
<title>Day 13 Responsive Design</title>

<style>

body {
font-family: Arial;
margin: 0;
}

/* Default layout (Laptop/Desktop) */

.container {

display: flex;
justify-content: space-around;

}

.box {

background-color: lightblue;
padding: 40px;
margin: 20px;

}

/* Mobile layout */

@media (max-width: 600px) {

.container {

flex-direction: column;

}

.box {

background-color: lightgreen;

}

}

</style>

</head>

<body>

<h1 style="text-align:center;">Responsive Website Example</h1>

<div class="container">

<div class="box">Box 1</div>
<div class="box">Box 2</div>
<div class="box">Box 3</div>

</div>

</body>

</html>
