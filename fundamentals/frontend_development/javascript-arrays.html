<!DOCTYPE html>
<html>

<head>

<title>Day 21 JavaScript Arrays</title>

<style>

body {

font-family: Arial;
text-align: center;
padding: 50px;

}

button {

padding: 15px;
font-size: 18px;
background-color: black;
color: white;
border: none;

}

</style>

</head>

<body>

<h1>JavaScript Array Example</h1>

<p id="output">Click button to show students</p>

<button onclick="showStudents()">Show Students</button>

<script>

function showStudents() {

let students = ["Vinsan", "Rahul", "Priya", "Amit"];

let text = "";

for(let i = 0; i < students.length; i++) {

text = text + students[i] + "<br>";

}

document.getElementById("output").innerHTML = text;

}

</script>

</body>

</html>
