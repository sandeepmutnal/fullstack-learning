<!DOCTYPE html>
<html>

<head>

<title>Day 24 JavaScript Functions</title>

<style>

body {

font-family: Arial;
text-align: center;
padding: 50px;

}

button {

padding: 15px;
font-size: 18px;
margin: 10px;
background-color: black;
color: white;
border: none;

}

</style>

</head>

<body>

<h1>JavaScript Functions Example</h1>

<p id="output">Click button to run function</p>

<button onclick="showWelcome()">Show Welcome</button>

<button onclick="showGoal()">Show Goal</button>

<script>

function showWelcome() {

document.getElementById("output").innerHTML =
"Welcome Vinsan! 🚀";

}

function showGoal() {

document.getElementById("output").innerHTML =
"My goal is to become a Freelance Developer 💻";

}

</script>

</body>

</html>
