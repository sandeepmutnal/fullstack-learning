<!DOCTYPE html>
<html>

<head>
    <title>Day 10 Box Model</title>

    <style>

        body {
            background-color: #f4f4f4;
            font-family: Arial;
        }

        .box {
            background-color: white;

            padding: 20px;      /* inside space */
            border: 3px solid black;  /* border line */
            margin: 30px;       /* outside space */

            font-size: 18px;
        }

        h1 {
            text-align: center;
        }

    </style>

</head>

<body>

<h1>CSS Box Model</h1>

<div class="box">
    This is a box. It has padding, border, and margin.
</div>

<div class="box">
    This is another box. Notice the space between them.
</div>

</body>

</html>
